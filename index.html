<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="main">
        <label for="name">Название фильма:</label>
        <input 
            type="text"
            id="name"
            name="fName"
            placeholder="Введите название фильма"
        ></input>
        <label for="date">Год выпуска фильма:</label>
        <input
            type="date"
            id="date"
            name="fDate"
        ></input>
        <label for="genre">Жанры фильма через запятую:</label>
        <input
            type="text"
            id="genre"
            name="fGenre"
            placeholder="Введите жанр фильма"
        ></input>
        <label for="rating">Рейтинг фильма:</label>
        <span id="rating-value">0.0</span>
        <input
            type="range"
            id="rating"
            name="fRating"
            min="1.0"
            max="10.0"
            step="0.1"
            value="0"
        ></input>
        <label for="viewed">Просмотрен:</label>
        <input 
        type="checkbox"
        id="viewed"
        name="fViewed"
        >
        <label for="comment">Комментарии:</label>
        <textarea
        type="text"
        id="comment"
        name="fComment"
        placeholder="Напишите здесь что-нибудь..."
        ></textarea>
        <button type="button" id="saveButton" onclick="saveData()">Сохранить</button>
        <button type="button" id="deleteButton">Удалить</button>
        <button type="button" id="clearButton" onclick="clearData()">Очистить</button>
    </div>
    <div id="filmListContainer">
        <input type="text" id ="search" name="fSearch" placeholder="Поиск по названиям и комментариям"></input>
        <select id="view-filter">
            <option value="every">Все фильмы</option>
            <option value="viewed">Просмотренные</option>
            <option value="not-viewed">Непросмотренные</option>
        </select>
        <input type="text" id ="genreFilter" name="gFilter" placeholder="Напишите жанр фильма"></input>
        <label for="filmList">Список фильмов:</label>
        <ul id="filmList"></ul>
    </div>
    <script src="index.js" defer></script> 
</body>
</html>
